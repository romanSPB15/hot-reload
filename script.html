<script>
    (function() {
        // Создаём индикатор
        var indicator = document.createElement('div');
        indicator.id = 'ws-indicator';
        indicator.style.cssText = `
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(4px);
        `;
        var statusDot = document.createElement('span');
        statusDot.style.cssText = `
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffc107;
            transition: background 0.3s;
        `;
        var statusText = document.createElement('span');
        statusText.textContent = 'Соединение...';
        indicator.appendChild(statusDot);
        indicator.appendChild(statusText);
        document.body.appendChild(indicator);

        function setStatus(status, text) {
            var colors = {
                connecting: '#ffc107',   // жёлтый
                connected: '#4caf50',    // зелёный
                disconnected: '#f44336'  // красный
            };
            statusDot.style.background = colors[status] || '#ffc107';
            statusText.textContent = text || 'Соединение...';
        }

        var ws = null;
        var reconnectAttempts = 0;
        var maxReconnectAttempts = 5;
        var reconnectInterval = 2000;

        function connectWebSocket() {
            setStatus('connecting', 'Подключение...');
            ws = new WebSocket('ws://' + location.host + '/ws');
            ws.onopen = function() {
                setStatus('connected', 'Подключено');
                reconnectAttempts = 0;
            };
            ws.onmessage = function(event) {
                if (event.data === 'reload') {
                    console.log('Reload signal received');
                    location.reload();
                }
            };
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
            ws.onclose = function(event) {
                if (event.wasClean) {
                    console.log('WebSocket closed cleanly, code:', event.code);
                } else {
                    console.log('WebSocket closed abruptly, code:', event.code);
                }
                setStatus('disconnected', 'Отключено');
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    console.log('Reconnect attempt #' + reconnectAttempts + ' in ' + reconnectInterval/1000 + 's');
                    setTimeout(connectWebSocket, reconnectInterval);
                } else {
                    setStatus('disconnected', 'Ошибка подключения');
                    console.log('Max reconnect attempts reached');
                }
            };
        }

        connectWebSocket();
    })();
</script>
